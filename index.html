<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流动相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* ===== 顶部标题 ===== */
        .header {
            text-align: center;
            padding: 30px 20px 10px;
            color: #fff;
            background: linear-gradient(180deg, #1a1a1a 0%, transparent 100%);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 6px;
            color: #f0e8e0;
            text-shadow: 0 2px 20px rgba(255, 200, 150, 0.15);
        }

        .header p {
            font-size: 13px;
            color: #888;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* ===== 瀑布流容器 ===== */
        .gallery {
            columns: 2;
            column-gap: 12px;
            padding: 12px 12px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== 每张照片卡片 ===== */
        .photo-card {
            break-inside: avoid;
            margin-bottom: 12px;
            border-radius: 18px;
            overflow: hidden;
            background: #1e1e1e;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .photo-card:active {
            transform: scale(0.97);
        }

        .photo-card img {
            width: 100%;
            display: block;
            transition: filter 0.3s ease;
        }

        .photo-card .caption {
            padding: 10px 14px 12px;
            color: #ccc;
            font-size: 14px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .photo-card .caption span {
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .photo-card .caption i {
            font-style: normal;
            font-size: 11px;
            color: #888;
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 14px;
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        /* ===== 灯箱（点击放大） ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 30px;
            animation: fadeIn 0.25s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .lightbox .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 38px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            font-weight: 100;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.04);
        }

        .lightbox .close-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .lightbox .lightbox-caption {
            color: #bbb;
            margin-top: 20px;
            font-size: 16px;
            letter-spacing: 1px;
            padding: 8px 28px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== 底部音乐播放器（浮动） ===== */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: rgba(28, 28, 30, 0.88);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 60px;
            padding: 10px 20px 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        .music-player .track-icon {
            font-size: 22px;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
            flex-shrink: 0;
        }

        .music-player .track-name {
            color: #e8e0d8;
            font-size: 13px;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            letter-spacing: 0.3px;
        }

        .music-player audio {
            width: 100px;
            height: 34px;
            flex-shrink: 0;
            border-radius: 40px;
            outline: none;
            background: transparent;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.1));
        }

        .music-player audio::-webkit-media-controls-panel {
            background: rgba(60, 60, 65, 0.3);
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .music-player audio::-webkit-media-controls-play-button {
            filter: invert(1) brightness(0.8);
        }

        /* ===== 自动滚动提示 ===== */
        .scroll-hint {
            text-align: center;
            color: #555;
            font-size: 12px;
            letter-spacing: 3px;
            padding: 4px 0 12px;
            opacity: 0.5;
        }

        .scroll-hint span {
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(4px);
            }
        }

        /* ===== 空状态 ===== */
        .empty-note {
            color: #666;
            text-align: center;
            padding: 60px 20px;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .gallery {
                columns: 2;
                column-gap: 8px;
                padding: 8px 8px 20px;
            }
            .photo-card {
                border-radius: 14px;
                margin-bottom: 8px;
            }
            .photo-card .caption {
                font-size: 12px;
                padding: 8px 12px 10px;
            }
            .music-player {
                padding: 8px 16px 8px 18px;
                bottom: 14px;
                width: calc(100% - 28px);
            }
            .music-player audio {
                width: 80px;
            }
            .header h1 {
                font-size: 22px;
            }
        }

        @media (min-width: 600px) {
            .gallery {
                columns: 3;
                max-width: 700px;
            }
            .music-player {
                max-width: 500px;
            }
            .music-player audio {
                width: 140px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部 -->
    <div class="header">
        <h1>✦ 流动时光</h1>
        <p>· 滑 动 浏 览 · 点 击 放 大 ·</p>
        <div class="scroll-hint"><span>↓ 向下滑动 ↓</span></div>
    </div>

    <!-- 照片墙 -->
    <div class="gallery" id="galleryContainer"></div>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="closeLightbox">✕</button>
        <img id="lightboxImg" src="" alt="放大预览">
        <div class="lightbox-caption" id="lightboxCaption">📷</div>
    </div>

    <!-- 底部音乐播放器 -->
    <div class="music-player">
        <span class="track-icon">🎵</span>
        <span class="track-name" id="trackName">微风午后</span>
        <audio controls id="audioPlayer" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            浏览器不支持音频
        </audio>
    </div>

    <script>
        // ============================================================
        // 🖼️ 在这里替换成你自己的照片！
        // ============================================================
        const photos = [
            { src: 'https://picsum.photos/seed/1/400/500', caption: '🌅 海边日落', tag: '旅行' },
            { src: 'https://picsum.photos/seed/2/400/600', caption: '🌲 森林深处', tag: '自然' },
            { src: 'https://picsum.photos/seed/3/400/450', caption: '🏙️ 城市灯火', tag: '夜景' },
            { src: 'https://picsum.photos/seed/4/400/550', caption: '🌸 樱花盛开', tag: '春天' },
            { src: 'https://picsum.photos/seed/5/400/480', caption: '☕ 咖啡时光', tag: '日常' },
            { src: 'https://picsum.photos/seed/6/400/620', caption: '🐈 慵懒猫咪', tag: '治愈' },
            { src: 'https://picsum.photos/seed/7/400/430', caption: '🌊 浪花拍岸', tag: '夏日' },
            { src: 'https://picsum.photos/seed/8/400/580', caption: '🎈 童年回忆', tag: '怀旧' },
            { src: 'https://picsum.photos/seed/9/400/500', caption: '🌾 麦田黄昏', tag: '田野' },
            { src: 'https://picsum.photos/seed/10/400/470', caption: '❄️ 雪中漫步', tag: '冬日' },
        ];

        // ============================================================
        // 🎵 在这里替换成你自己的音乐！
        // ============================================================
        const musicConfig = {
            src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
            name: '微风午后'
        };

        // ============================================================
        // 渲染
        // ============================================================
        const gallery = document.getElementById('galleryContainer');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const closeBtn = document.getElementById('closeLightbox');

        function renderGallery() {
            if (!gallery) return;
            gallery.innerHTML = '';

            if (photos.length === 0) {
                gallery.innerHTML = `<div class="empty-note">📸 还没有照片，快去添加吧</div>`;
                return;
            }

            photos.forEach((photo) => {
                const card = document.createElement('div');
                card.className = 'photo-card';

                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = photo.caption || '照片';
                img.loading = 'lazy';

                const captionDiv = document.createElement('div');
                captionDiv.className = 'caption';
                const span = document.createElement('span');
                span.textContent = photo.caption || '📷';
                const tag = document.createElement('i');
                tag.textContent = photo.tag || '相册';

                captionDiv.appendChild(span);
                captionDiv.appendChild(tag);
                card.appendChild(img);
                card.appendChild(captionDiv);

                card.addEventListener('click', function() {
                    lightboxImg.src = photo.src;
                    lightboxCaption.textContent = photo.caption || '📷 照片';
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });

                gallery.appendChild(card);
            });
        }

        // 灯箱控制
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        // 音乐
        function setupMusic() {
            const audio = document.getElementById('audioPlayer');
            const trackNameEl = document.getElementById('trackName');
            if (audio && trackNameEl) {
                if (musicConfig.src) {
                    audio.innerHTML = '';
                    const source = document.createElement('source');
                    source.src = musicConfig.src;
                    source.type = 'audio/mpeg';
                    audio.appendChild(source);
                    audio.load();
                    // 自动播放（大部分浏览器需要用户交互后才行，但加了loop）
                    audio.loop = true;
                }
                if (musicConfig.name) {
                    trackNameEl.textContent = musicConfig.name;
                }
            }
        }

        renderGallery();
        setupMusic();

        console.log('✅ 流动相册已启动！');
        console.log('💡 修改 photos 数组换照片，修改 musicConfig 换音乐');
    </script>

</body>
</html>
